<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - BuildMart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/cart-badge.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="header-placeholder"></div>

<main class="shopping-cart-page">
    <div class="cart-container">
        <h1 class="cart-title">Shopping Cart</h1>
        
        <div class="cart-content">
            <div class="cart-items-section">
                <div class="cart-table-card">
                    <div class="cart-table-header">
                        <div class="header-product">Product</div>
                        <div class="header-price">Price</div>
                        <div class="header-quantity">Quantity</div>
                        <div class="header-total">Total</div>
                    </div>

                    <div class="cart-items">
                    </div>
                </div>

                <div class="promo-section">
                    <h3 class="promo-title">Have a promo code?</h3>
                    <div class="promo-form">
                        <input type="text" placeholder="Enter promo code" class="promo-input">
                        <button class="promo-btn">Apply</button>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="order-summary">
                </div>

                <div class="shipping-info">
                    <h3 class="shipping-title">Shipping Information</h3>
                    
                    <div class="shipping-item">
                        <div class="shipping-icon calendar-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="3" y="6" width="18" height="15" rx="2" stroke="#FF5722" stroke-width="2" fill="none"/>
                                <path d="M3 10h18" stroke="#FF5722" stroke-width="2"/>
                                <path d="M8 3v4M16 3v4" stroke="#FF5722" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="shipping-details">
                            <p class="shipping-label">Estimated Delivery</p>
                            <p class="shipping-value">3-5 business days</p>
                        </div>
                    </div>

                    <div class="shipping-item">
                        <div class="shipping-icon location-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z" stroke="#FF5722" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="10" r="3" stroke="#FF5722" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="shipping-details">
                            <p class="shipping-label">Shipping Address</p>
                            <p class="shipping-value">123 Construction Ave<br>Builder City, BC 12345<br>United States</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>
<script src="js/components.js"></script>
<template id="cart-item-template">
    <div class="cart-item">
        <div class="item-product">
            <div class="item-image">
                <img src="" alt="">
            </div>
            <div class="item-info">
                <h3 class="item-name"></h3>
                <p class="item-category"></p>
            </div>
        </div>
        <div class="item-price"></div>
        <div class="item-quantity">
            <button class="qty-btn qty-decrease">−</button>
            <span class="qty-value"></span>
            <button class="qty-btn qty-increase">+</button>
        </div>
        <div class="item-total"></div>
        <button class="delete-btn">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 4H14M6.5 7V11M9.5 7V11M3 4L4 13C4 13.5304 4.21071 14.0391 4.58579 14.4142C4.96086 14.7893 5.46957 15 6 15H10C10.5304 15 11.0391 14.7893 11.4142 14.4142C11.7893 14.0391 12 13.5304 12 13L13 4M5.5 4V3C5.5 2.73478 5.60536 2.48043 5.79289 2.29289C5.98043 2.10536 6.23478 2 6.5 2H9.5C9.76522 2 10.0196 2.10536 10.2071 2.29289C10.3946 2.48043 10.5 2.73478 10.5 3V4" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</template>
<script src="js/cart.js"></script>
<script src="js/cart-badge.js"></script>
</body>
</html>
