<header class="header">
    <div class="header-content">
        <a href="index.html" class="logo">
            <div class="logo-box">BM</div>
            <span class="logo-text">BuildMart</span>
        </a>

        <nav class="nav">
            <a href="index.html" class="nav-link active">Products</a>
