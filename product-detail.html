<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - BuildMart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/mobile-menu.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cart-badge.css">
    <link rel="stylesheet" href="css/product-detail.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="header-placeholder"></div>

<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-search">
        <div class="search-container">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7.25 12.5C10.1495 12.5 12.5 10.1495 12.5 7.25C12.5 4.3505 10.1495 2 7.25 2C4.3505 2 2 4.3505 2 7.25C2 10.1495 4.3505 12.5 7.25 12.5Z" stroke="#6F7D8E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M14 14L11 11" stroke="#6F7D8E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            <input type="text" placeholder="Search products..." class="search-input">
        </div>
    </div>

    <nav class="mobile-nav">
        <a href="index.html" class="nav-link mobile-nav-link active">Products</a>
        <a href="#" class="nav-link mobile-nav-link">Categories</a>
        <a href="#" class="nav-link mobile-nav-link">Deals</a>
        <a href="#" class="nav-link mobile-nav-link">About</a>
    </nav>
</div>

<div class="breadcrumb">
    <a href="index.html">Products</a>
    <span>/</span>
    <span id="breadcrumb-product" class="breadcrumb-text-current"></span>
</div>

<div class="product-detail-container">
    <div class="product-gallery">
        <div class="main-image-container">
            <img id="main-image" class="main-image" src="" alt="">
            <button class="gallery-nav prev" onclick="changeImage(-1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button class="gallery-nav next" onclick="changeImage(1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
        <div class="thumbnail-container" id="thumbnail-container">
        </div>
    </div>

    <div class="product-info-detail">
        <h1 class="product-title-detail" id="product-title"></h1>
        
        <div class="rating-detail">
            <div class="stars-detail" id="product-stars"></div>
            <span class="rating-count-detail" id="product-rating"></span>
        </div>
        
        <div class="price-detail">
            <span id="product-price"></span>
            <span class="price-unit">/unit</span>
        </div>

        <div class="features-grid">

            <div class="feature-item">
                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.3 7 12 12 20.7 7"></polyline>
                    <line x1="12" y1="22" x2="12" y2="12"></line>
                </svg>

                <div class="feature-text">
                    <div class="feature-title">Quality Assured</div>
                    <div class="feature-desc">Premium grade material</div>
                </div>
            </div>


            <div class="feature-item">
                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="1" y="3" width="15" height="13"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>

                <div class="feature-text">
                    <div class="feature-title">Fast Delivery</div>
                    <div class="feature-desc">2-5 business days</div>
                </div>
            </div>


            <div class="feature-item">
                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z"></path>
                </svg>

                <div class="feature-text">
                    <div class="feature-title">Warranty</div>
                    <div class="feature-desc">30-day guarantee</div>
                </div>
            </div>

        </div>
        
        <div class="quantity-section">
            <div class="quantity-label">Quantity</div>
            <div class="quantity-controls">
                <button class="quantity-btn" onclick="decreaseQuantity()">-</button>
                <input type="number" id="quantity-input" class="quantity-input" value="1" min="1">
                <button class="quantity-btn" onclick="increaseQuantity()">+</button>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-add-to-cart" onclick="addToCart()">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3H5L6.5 11.5H16L18 5.5H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="6.5" cy="13.5" r="1" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="15.5" cy="13.5" r="1" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                Add to Cart
            </button>
            <button class="btn-buy-now">Buy Now</button>
        </div>
        
        <div class="description-section">
            <h2 class="section-title">Description</h2>
            <p class="description-text" id="product-description"></p>
        </div>
        
        <div class="specs-section">
            <div class="specs-header" onclick="toggleSpecs()">
                <h2 class="specs-section-title">Technical Specifications</h2>
                <svg class="specs-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
            <div class="specs-content" id="specs-content">
                <div class="specs-grid" id="specs-grid">
                    <!-- Specifications will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<div class="related-products-section">
    <div class="related-products-container">
        <h2 class="related-title">Related Products</h2>
        <div class="related-products-grid" id="related-products-grid">
            <!-- Related products will be loaded here -->
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script src="js/mobile-menu.js"></script>
<script src="js/cart-badge.js"></script>
<script src="js/product-detail.js"></script>
</body>
</html>
